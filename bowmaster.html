<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bowmasters: Ultimate Powers - Final Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: 'Arial Black', sans-serif; -webkit-tap-highlight-color: transparent; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        
        #ui-layer {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #fff; pointer-events: none; user-select: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); z-index: 10;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; 
            pointer-events: auto; touch-action: auto; /* Mobilde tıklamayı garanti eder */
        }

        .menu-content { 
            background: #fff; padding: 25px; border-radius: 25px; text-align: center;
            width: 85%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: all;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .opt { 
            padding: 15px 10px; border: 3px solid #eee; border-radius: 15px; cursor: pointer;
            font-size: 11px; color: #444; background: #fdfdfd;
        }
        .opt.selected { border-color: #ff4757; background: #fff1f2; font-weight: bold; }
        button.main-btn {
            background: #27ae60; color: white; border: none; padding: 15px 45px;
            font-size: 18px; border-radius: 50px; cursor: pointer; width: 100%;
        }
        .turn-info { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        #main-menu-btn {
            position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white;
            border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; z-index: 100; display: none;
        }
    </style>
</head>
<body>

<button id="main-menu-btn" onclick="goToMainMenu()">MENÜ</button>

<div id="map-layer" class="overlay">
    <div class="menu-content">
        <h1>DÜNYA SEÇİMİ</h1>
        <div class="grid">
            <div id="opt-valley" class="opt selected" onclick="selectMap('valley')">🍃 YEŞİL VADİ</div>
            <div id="opt-desert" class="opt" onclick="selectMap('desert')">⏳ GECE ÇÖLÜ</div>
            <div id="opt-mars" class="opt" onclick="selectMap('mars')">🔴 MARS</div>
            <div id="opt-ice" class="opt" onclick="selectMap('ice')">❄️ BUZ DİYARI</div>
            <div id="opt-volcano" class="opt" onclick="selectMap('volcano')">🔥 VOLKANİK</div>
        </div>
        <button class="main-btn" onclick="nextToWeapons()">İLERİ</button>
    </div>
</div>

<div id="weapon-layer" class="overlay" style="display:none;">
    <div class="menu-content">
        <h1 id="choosing-title">P1 SEÇİMİ</h1>
        <div class="grid">
            <div class="opt weapon-opt selected" onclick="selectWeapon('standard', this)">🎯 STANDART</div>
            <div class="opt weapon-opt" onclick="selectWeapon('bomb', this)">💣 PATLAYAN</div>
            <div class="opt weapon-opt" onclick="selectWeapon('triple', this)">🔱 BÖLÜNEN</div>
            <div class="opt weapon-opt" onclick="selectWeapon('lightning', this)">⚡ YILDIRIM</div>
        </div>
        <button class="main-btn" onclick="confirmWeapon()">SEÇ</button>
    </div>
</div>

<div id="ui-layer" style="display:none;">
    <div id="turnText" class="turn-info" style="color: #ff4757;">P1 ATIŞI</div>
    <div style="font-size: 20px;">SKOR: <span id="p1Score">0</span> - <span id="p2Score">0</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const WORLD_WIDTH = 4000;
    const GAME_SCALE = 0.8; 

    let tempWeapon = 'standard';

    const game = {
        state: 'MENU', turn: 1, isFlying: false, score1: 0, score2: 0,
        gravity: 0.25, isDragging: false, dragStart: {x: 0, y: 0}, dragCurrent: {x: 0, y: 0},
        maxPower: 40, dragSensitivity: 0.15, cameraX: 0, terrainPoints: [], particles: [],
        activeProjectiles: [], floatingTexts: [], isWaitingForAnim: false, currentMap: 'valley',
        p1Weapon: 'standard', p2Weapon: 'standard', choosingPlayer: 1
    };

    const MAP_SETTINGS = {
        valley:  { gravity: 0.25, sky: "#4facfe", ground: "#27ae60" },
        desert:  { gravity: 0.18, sky: "#2c3e50", ground: "#e67e22" },
        mars:    { gravity: 0.12, sky: "#5d4037", ground: "#c0392b" },
        ice:     { gravity: 0.22, sky: "#a1c4fd", ground: "#fdfbfb" },
        volcano: { gravity: 0.25, sky: "#1a0f0f", ground: "#4a0e0e" }
    };

    function selectMap(m) {
        game.currentMap = m;
        document.querySelectorAll('#map-layer .opt').forEach(o => o.classList.remove('selected'));
        document.getElementById('opt-' + m).classList.add('selected');
    }

    function nextToWeapons() { 
        document.getElementById('map-layer').style.display = 'none'; 
        document.getElementById('weapon-layer').style.display = 'flex'; 
    }

    function selectWeapon(w, el) { 
        tempWeapon = w; 
        document.querySelectorAll('.weapon-opt').forEach(o => o.classList.remove('selected')); 
        el.classList.add('selected'); 
    }

    function confirmWeapon() {
        if(game.choosingPlayer === 1) { 
            game.p1Weapon = tempWeapon; 
            game.choosingPlayer = 2; 
            document.getElementById('choosing-title').innerText = "P2 SEÇİMİ";
            document.querySelectorAll('.weapon-opt').forEach(o => o.classList.remove('selected'));
            document.querySelector('.weapon-opt').classList.add('selected');
        }
        else { 
            game.p2Weapon = tempWeapon; 
            startGame(); 
        }
    }

    function startGame() {
        game.state = 'PLAYING'; 
        game.gravity = MAP_SETTINGS[game.currentMap].gravity;
        document.getElementById('weapon-layer').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        document.getElementById('main-menu-btn').style.display = 'block';
        generateTerrain(); p1.hp = 100; p2.hp = 100;
    }

    function goToMainMenu() { location.reload(); }

    function generateTerrain() {
        game.terrainPoints = [];
        let points = [];
        let baseHeight = (window.innerHeight / GAME_SCALE) * 0.75;
        for (let x = 0; x <= WORLD_WIDTH + 400; x += 200) points.push({ x, y: baseHeight + (Math.random() - 0.5) * 150 });
        for (let x = 0; x <= WORLD_WIDTH; x += 5) {
            let p1Idx = Math.floor(x / 200); let t = (x % 200) / 200; let f = (1 - Math.cos(t * Math.PI)) * 0.5;
            game.terrainPoints.push({ x, y: points[p1Idx].y * (1 - f) + points[p1Idx + 1].y * f });
        }
    }

    function getTerrainY(x) {
        let idx = Math.floor(Math.max(0, Math.min(x, WORLD_WIDTH)) / 5);
        return game.terrainPoints[idx] ? game.terrainPoints[idx].y : 2000;
    }

    function createParticles(x, y, color) {
        for (let i = 0; i < 20; i++) game.particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-1)*10, life: 1.0, color });
    }

    function addText(x, y, txt, color, big=false) {
        game.floatingTexts.push({ x, y, txt, color, life: 1.0, size: big?40:24, vy: -2 });
    }

    class Character {
        constructor(x, color, isP1) { this.x = x; this.color = color; this.isP1 = isP1; this.hp = 100; this.angle = 0; }
        draw() {
            const groundY = getTerrainY(this.x);
            ctx.save(); ctx.translate(this.x - game.cameraX, groundY); ctx.rotate(this.angle);
            ctx.fillStyle = this.color; ctx.fillRect(-15, -40, 30, 40);
            ctx.fillStyle = "#ffdbac"; ctx.beginPath(); ctx.arc(0, -55, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "red"; ctx.fillRect(-20, -80, 40, 5);
            ctx.fillStyle = "lime"; ctx.fillRect(-20, -80, (this.hp/100)*40, 5);
            ctx.restore();
        }
        hit(dmg, head) {
            this.hp -= dmg; createParticles(this.x, getTerrainY(this.x)-30, "red");
            addText(this.x, getTerrainY(this.x)-60, head ? "HEADSHOT!" : "-"+dmg, head?"yellow":"white", head);
            if(this.hp <= 0) { 
                game.score1 += this.isP1?0:1; game.score2 += this.isP1?1:0; 
                document.getElementById('p1Score').innerText = game.score1; 
                document.getElementById('p2Score').innerText = game.score2;
                setTimeout(() => { this.hp = 100; p1.x=500; p2.x=WORLD_WIDTH-500; }, 2000);
            }
        }
    }

    let p1 = new Character(500, '#ff4757', true), p2 = new Character(WORLD_WIDTH - 500, '#1e90ff', false);

    const handleStart = (e) => {
        // MENÜ ELEMANLARINA TIKLANDIĞINDA OYUNUN SÜRÜKLEME MANTIĞINI DURDURUR
        if (e.target.tagName === 'BUTTON' || e.target.classList.contains('opt')) return;

        if(game.state !== 'PLAYING' || game.isFlying) return;
        
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        let cx = clientX / GAME_SCALE;
        let cy = clientY / GAME_SCALE;
        
        game.isDragging = true; 
        game.dragStart = { x: cx, y: cy }; 
        game.dragCurrent = { x: cx, y: cy };
    };

    const handleMove = (e) => {
        if(game.isDragging) {
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            game.dragCurrent = { x: clientX/GAME_SCALE, y: clientY/GAME_SCALE };
        }
    };

    const handleEnd = () => {
        if(!game.isDragging) return; 
        game.isDragging = false;
        let vx = (game.dragStart.x - game.dragCurrent.x) * game.dragSensitivity;
        let vy = (game.dragStart.y - game.dragCurrent.y) * game.dragSensitivity;
        game.activeProjectiles.push({ x: (game.turn===1?p1.x:p2.x), y: getTerrainY(game.turn===1?p1.x:p2.x)-60, vx, vy, type: (game.turn===1?game.p1Weapon:game.p2Weapon) });
        game.isFlying = true;
    };

    window.addEventListener('mousedown', handleStart); 
    window.addEventListener('mousemove', handleMove); 
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchstart', handleStart, {passive: false}); 
    window.addEventListener('touchmove', handleMove, {passive: false}); 
    window.addEventListener('touchend', handleEnd);

    function update() {
        if (game.state === 'PLAYING') {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.scale(GAME_SCALE, GAME_SCALE);
            
            let focusX = game.isFlying ? game.activeProjectiles[0].x : (game.turn===1?p1.x:p2.x);
            game.cameraX += (focusX - (canvas.width/GAME_SCALE)/2 - game.cameraX) * 0.1;
            game.cameraX = Math.max(0, Math.min(game.cameraX, WORLD_WIDTH - canvas.width/GAME_SCALE));

            ctx.fillStyle = MAP_SETTINGS[game.currentMap].sky; ctx.fillRect(0,0, WORLD_WIDTH, 2000);
            ctx.fillStyle = MAP_SETTINGS[game.currentMap].ground; ctx.beginPath(); ctx.moveTo(-game.cameraX, 2000);
            game.terrainPoints.forEach(p => ctx.lineTo(p.x - game.cameraX, p.y)); ctx.lineTo(WORLD_WIDTH, 2000); ctx.fill();

            p1.draw(); p2.draw();

            if(game.isDragging) {
                let currP = game.turn===1?p1:p2;
                let tx = currP.x, ty = getTerrainY(currP.x)-60;
                let tvx = (game.dragStart.x - game.dragCurrent.x) * game.dragSensitivity;
                let tvy = (game.dragStart.y - game.dragCurrent.y) * game.dragSensitivity;
                ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.setLineDash([5,5]);
                ctx.beginPath(); ctx.moveTo(tx-game.cameraX, ty);
                for(let i=0; i<30; i++) { tx += tvx; ty += tvy; tvy += game.gravity; ctx.lineTo(tx-game.cameraX, ty); if(ty > getTerrainY(tx)) break; }
                ctx.stroke(); ctx.setLineDash([]);
            }

            for(let i=game.activeProjectiles.length-1; i>=0; i--) {
                let m = game.activeProjectiles[i]; m.vy += game.gravity; m.x += m.vx; m.y += m.vy;
                ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(m.x-game.cameraX, m.y, 6, 0, Math.PI*2); ctx.fill();
                
                let target = game.turn===1?p2:p1;
                let dist = Math.hypot(m.x-target.x, m.y-(getTerrainY(target.x)-30));
                if(dist < 30) { 
                    target.hit(30, dist < 15); 
                    game.activeProjectiles.splice(i,1); 
                    game.isFlying=false; 
                    game.turn=game.turn===1?2:1; 
                    document.getElementById('turnText').innerText = "P"+game.turn+" ATIŞI"; 
                    document.getElementById('turnText').style.color = game.turn===1?"#ff4757":"#1e90ff";
                }
                else if(m.y > getTerrainY(m.x)) { 
                    game.activeProjectiles.splice(i,1); 
                    game.isFlying=false; 
                    game.turn=game.turn===1?2:1; 
                    document.getElementById('turnText').innerText = "P"+game.turn+" ATIŞI"; 
                    document.getElementById('turnText').style.color = game.turn===1?"#ff4757":"#1e90ff";
                }
            }

            game.floatingTexts.forEach((t,i) => { t.y += t.vy; t.life-=0.02; ctx.fillStyle=t.color; ctx.globalAlpha=t.life; ctx.font=t.size+"px Arial"; ctx.fillText(t.txt, t.x-game.cameraX, t.y); if(t.life<=0) game.floatingTexts.splice(i,1); });
            game.particles.forEach((p,i) => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.life-=0.03; ctx.fillStyle=p.color; ctx.globalAlpha=p.life; ctx.fillRect(p.x-game.cameraX, p.y, 4, 4); if(p.life<=0) game.particles.splice(i,1); });
            
            ctx.globalAlpha = 1; ctx.restore();
        }
        requestAnimationFrame(update);
    }
    
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
    update();
</script>
</body>
</html>
