<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bowmasters: Ultimate Powers - Wide View</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #fff; pointer-events: none; user-select: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); display: none; z-index: 10;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .menu-content { 
            background: #fff; padding: 30px; border-radius: 25px; text-align: center;
            width: 95%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: all;
        }
        h1 { color: #2c3e50; margin: 0 0 10px 0; font-size: 22px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .opt { 
            padding: 12px; border: 3px solid #eee; border-radius: 12px; cursor: pointer;
            transition: 0.2s; font-size: 11px; color: #444; background: #fdfdfd;
        }
        .opt.selected { border-color: #ff4757; background: #fff1f2; font-weight: bold; }
        button.main-btn {
            background: #27ae60; color: white; border: none; padding: 12px 40px;
            font-size: 18px; border-radius: 50px; cursor: pointer; font-family: 'Arial Black';
        }
        .turn-info { font-size: 28px; font-weight: 900; }
        .score-box { font-size: 24px; background: rgba(0,0,0,0.2); padding: 5px 20px; border-radius: 15px; display: inline-block; }
        #main-menu-btn {
            position: absolute; top: 20px; right: 20px;
            background: #e74c3c; color: white; border: none; padding: 10px 15px;
            font-size: 14px; border-radius: 10px; cursor: pointer;
            font-family: 'Arial Black'; z-index: 100; display: none;
        }
    </style>
</head>
<body>

<button id="main-menu-btn" onclick="goToMainMenu()">ANA MENÜ</button>

<div id="map-layer" class="overlay">
    <div class="menu-content">
        <h1>DÜNYA SEÇİMİ</h1>
        <div class="grid">
            <div id="opt-valley" class="opt selected" onclick="selectMap('valley')">🍃 YEŞİL VADİ</div>
            <div id="opt-desert" class="opt" onclick="selectMap('desert')">⏳ GECE ÇÖLÜ</div>
            <div id="opt-mars" class="opt" onclick="selectMap('mars')">🔴 MARS</div>
            <div id="opt-ice" class="opt" onclick="selectMap('ice')">❄️ BUZ DİYARI</div>
            <div id="opt-volcano" class="opt" onclick="selectMap('volcano')">🔥 VOLKANİK</div>
        </div>
        <button class="main-btn" onclick="nextToWeapons()">İLERİ</button>
    </div>
</div>

<div id="weapon-layer" class="overlay" style="display:none;">
    <div class="menu-content">
        <h1 id="choosing-title">P1 SEÇİMİ</h1>
        <div class="grid">
            <div class="opt weapon-opt selected" onclick="selectWeapon('standard', this)">🎯 STANDART</div>
            <div class="opt weapon-opt" onclick="selectWeapon('bomb', this)">💣 PATLAYAN</div>
            <div class="opt weapon-opt" onclick="selectWeapon('triple', this)">🔱 BÖLÜNEN</div>
            <div class="opt weapon-opt" onclick="selectWeapon('bouncy', this)">🎾 SEKEN</div>
            <div class="opt weapon-opt" onclick="selectWeapon('lightning', this)">⚡ YILDIRIM</div>
            <div class="opt weapon-opt" onclick="selectWeapon('blackhole', this)">🌀 KARA DELİK</div>
            <div class="opt weapon-opt" onclick="selectWeapon('freeze', this)">🧊 BUZ</div>
        </div>
        <button class="main-btn" onclick="confirmWeapon()">SEÇ</button>
    </div>
</div>

<div id="ui-layer">
    <div id="turnText" class="turn-info" style="color: #ff4757;">P1 ATIŞI</div>
    <div class="score-box"><span id="p1Score">0</span> - <span id="p2Score">0</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const WORLD_WIDTH = 4000;
    
    // ZOOM AYARI: 1.0 tam ekran, 0.75 daha geniş görüş sağlar.
    const GAME_SCALE = 0.75; 

    const game = {
        state: 'MENU', turn: 1, isFlying: false, score1: 0, score2: 0,
        gravity: 0.25, isDragging: false, dragStart: {x: 0, y: 0}, dragCurrent: {x: 0, y: 0},
        maxPower: 35, dragSensitivity: 0.12, cameraX: 0, cameraShake: 0, terrainPoints: [], stuckInGround: [],
        particles: [], activeProjectiles: [], floatingTexts: [], isWaitingForAnim: false, currentMap: 'valley',
        p1Weapon: 'standard', p2Weapon: 'standard', choosingPlayer: 1, winner: null, bgElements: []
    };

    const MAP_SETTINGS = {
        valley:  { gravity: 0.25, sky: "#4facfe", ground: "#27ae60", bgType: 'clouds' },
        desert:  { gravity: 0.18, sky: "#2c3e50", ground: "#e67e22", bgType: 'stars' },
        mars:    { gravity: 0.12, sky: "#5d4037", ground: "#c0392b", bgType: 'dust' },
        ice:     { gravity: 0.22, sky: "#a1c4fd", ground: "#fdfbfb", bgType: 'snow' },
        volcano: { gravity: 0.25, sky: "#1a0f0f", ground: "#4a0e0e", bgType: 'embers' }
    };

    function selectMap(mapType) {
        game.currentMap = mapType;
        document.querySelectorAll('#map-layer .opt').forEach(opt => opt.classList.remove('selected'));
        document.getElementById('opt-' + mapType).classList.add('selected');
    }

    function nextToWeapons() {
        document.getElementById('map-layer').style.display = 'none';
        document.getElementById('weapon-layer').style.display = 'flex';
    }

    let tempWeapon = 'standard';
    function selectWeapon(w, el) {
        tempWeapon = w;
        document.querySelectorAll('.weapon-opt').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');
    }

    function confirmWeapon() {
        if(game.choosingPlayer === 1) {
            game.p1Weapon = tempWeapon;
            game.choosingPlayer = 2;
            document.getElementById('choosing-title').innerText = "P2 SEÇİMİ";
            document.querySelectorAll('.weapon-opt').forEach(opt => opt.classList.remove('selected'));
            document.querySelector('.weapon-opt').classList.add('selected');
            tempWeapon = 'standard';
        } else {
            game.p2Weapon = tempWeapon;
            startGame();
        }
    }

    function startGame() {
        game.gravity = MAP_SETTINGS[game.currentMap].gravity;
        game.score1 = 0; game.score2 = 0; game.winner = null; game.turn = 1;
        initBackground();
        document.getElementById('weapon-layer').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        document.getElementById('main-menu-btn').style.display = 'block';
        game.state = 'PLAYING';
        generateTerrain();
        resetRound();
    }

    function goToMainMenu() {
        game.state = 'MENU';
        game.choosingPlayer = 1;
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('main-menu-btn').style.display = 'none';
        document.getElementById('map-layer').style.display = 'flex';
        document.getElementById('choosing-title').innerText = "P1 SEÇİMİ";
    }

    function initBackground() {
        game.bgElements = [];
        for(let i=0; i<40; i++) {
            game.bgElements.push({
                x: Math.random() * WORLD_WIDTH,
                y: Math.random() * (window.innerHeight * 0.8),
                size: Math.random() * 60 + 40,
                speed: Math.random() * 0.5 + 0.1,
                opacity: Math.random() * 0.4 + 0.1
            });
        }
    }

    function drawBackground() {
        let settings = MAP_SETTINGS[game.currentMap];
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, settings.sky);
        grad.addColorStop(1, "#ffffff");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        game.bgElements.forEach(el => {
            let drawX = (el.x - game.cameraX * el.speed) % WORLD_WIDTH;
            if (drawX < -150) drawX += WORLD_WIDTH;

            ctx.fillStyle = `rgba(255, 255, 255, ${el.opacity})`;
            
            if (settings.bgType === 'clouds') {
                ctx.beginPath();
                ctx.arc(drawX, el.y, el.size * 0.5, 0, Math.PI * 2);
                ctx.arc(drawX + el.size * 0.3, el.y - el.size * 0.2, el.size * 0.4, 0, Math.PI * 2);
                ctx.arc(drawX + el.size * 0.6, el.y, el.size * 0.4, 0, Math.PI * 2);
                ctx.fill();
            } else if (settings.bgType === 'stars') {
                ctx.beginPath(); ctx.arc(drawX, el.y, el.size * 0.05, 0, Math.PI * 2); ctx.fill();
            } else if (settings.bgType === 'dust' || settings.bgType === 'embers') {
                ctx.fillStyle = settings.bgType === 'embers' ? `rgba(255, 100, 0, ${el.opacity})` : `rgba(200, 200, 150, ${el.opacity})`;
                ctx.fillRect(drawX, el.y, el.size * 0.1, el.size * 0.1);
            } else if (settings.bgType === 'snow') {
                ctx.beginPath(); ctx.arc(drawX, el.y, el.size * 0.1, 0, Math.PI * 2); ctx.fill();
            }
        });
    }

    function generateTerrain() {
        game.terrainPoints = [];
        let points = [];
        let baseHeight = window.innerHeight * 0.85;
        for (let x = 0; x <= WORLD_WIDTH + 300; x += 200) points.push({ x, y: baseHeight + (Math.random() - 0.5) * 180 });
        for (let x = 0; x <= WORLD_WIDTH; x += 5) {
            let p1Idx = Math.floor(x / 200);
            let t = (x % 200) / 200;
            let f = (1 - Math.cos(t * Math.PI)) * 0.5;
            game.terrainPoints.push({ x, y: points[p1Idx].y * (1 - f) + points[p1Idx + 1].y * f });
        }
    }

    function getTerrainY(x) {
        let idx = Math.floor(Math.max(0, Math.min(x, WORLD_WIDTH)) / 5);
        return game.terrainPoints[idx] ? game.terrainPoints[idx].y : window.innerHeight;
    }

    function createParticles(x, y, color, count=25, size=5) {
        for (let i = 0; i < count; i++) {
            game.particles.push({
                x, y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 1.0) * 12, 
                life: 1.0, color: color, size: size
            });
        }
    }

    function addFloatingText(x, y, text, color, isBig = false) {
        game.floatingTexts.push({ x, y, text, color, life: 1.0, size: isBig ? 45 : 28, vx: (Math.random() - 0.5) * 2, vy: -2 });
    }

    class AnimatedCharacter {
        constructor(x, color, isP1) {
            this.x = x; this.color = color; this.isP1 = isP1;
            this.hp = 100; this.state = "idle"; this.animTimer = 0; this.animFrame = 0; this.angle = 0;
        }
        takeHit(damage, isHeadshot = false) { 
            this.hp -= damage; this.state = "hit"; this.animTimer = 90;
            game.isWaitingForAnim = true; game.cameraShake = 25;
            createParticles(this.x, getTerrainY(this.x) - (isHeadshot ? 55 : 30), '#ff0000', 45, 4); 
            if (isHeadshot) addFloatingText(this.x, getTerrainY(this.x) - 100, "HEADSHOT!", "#ffea00", true); 
            addFloatingText(this.x + (Math.random()*40-20), getTerrainY(this.x) - 70, "-" + Math.round(damage), "#ffffff"); 
            this.targetX = Math.max(50, Math.min(this.x + (this.isP1 ? -120 : 120), WORLD_WIDTH-50)); 
        }
        update() {
            this.animFrame++;
            if (this.state === "hit") {
                this.x += (this.targetX - this.x) * 0.05;
                const targetAngle = this.isP1 ? -Math.PI/2.5 : Math.PI/2.5;
                this.angle += (targetAngle - this.angle) * 0.1;
                if (--this.animTimer <= 0) { this.state = "recovering"; this.animTimer = 60; }
            } else if (this.state === "recovering") {
                this.angle += (0 - this.angle) * 0.1;
                if (--this.animTimer <= 0) { this.state = "idle"; game.isWaitingForAnim = false; checkTurnSwitch(); }
            }
        }
        draw() {
            const groundY = getTerrainY(this.x);
            const wobble = this.state === "idle" ? Math.sin(this.animFrame * 0.1) * 3 : 0; 
            ctx.save(); ctx.translate(this.x - game.cameraX, groundY); ctx.rotate(this.angle);
            ctx.fillStyle = this.color; ctx.fillRect(-12, -2, 7, 25); ctx.fillRect(5, -2, 7, 25);   
            ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(-15, -45+wobble); ctx.lineTo(15, -45+wobble); ctx.lineTo(20, 0); ctx.fill();
            ctx.fillStyle = "#ffdbac"; ctx.beginPath(); ctx.arc(0, -55+wobble, 15, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "black"; ctx.lineWidth = 2;
            if (this.state === "hit") { this.drawX(-6, -57+wobble, 6); this.drawX(6, -57+wobble, 6); }
            else { ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(-5, -57+wobble, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -57+wobble, 2, 0, Math.PI*2); ctx.fill(); }
            
            ctx.strokeStyle = "#333"; ctx.lineWidth = 5; ctx.lineCap = "round";
            const shoulderX = this.isP1 ? 10 : -10;
            const shoulderY = -35 + wobble;

            if (!game.isFlying && game.turn === (this.isP1 ? 1 : 2) && game.isDragging && this.state === "idle" && game.state === 'PLAYING') {
                let vx = (game.dragStart.x - game.dragCurrent.x) * (game.dragSensitivity / GAME_SCALE);
                let vy = (game.dragStart.y - game.dragCurrent.y) * (game.dragSensitivity / GAME_SCALE);
                const angle = Math.atan2(vy, vx);
                const handX = shoulderX + Math.cos(angle) * 25;
                const handY = shoulderY + Math.sin(angle) * 25;
                ctx.beginPath(); ctx.moveTo(shoulderX, shoulderY); ctx.lineTo(handX, handY); ctx.stroke();
                drawSpearGraphic(handX, handY, angle, (this.isP1 ? game.p1Weapon : game.p2Weapon), false, true);
            } else {
                ctx.beginPath(); ctx.moveTo(shoulderX, shoulderY); ctx.lineTo(this.isP1 ? 25 : -25, -25 + wobble); ctx.stroke();
            }
            
            ctx.rotate(-this.angle); ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(-20, -85, 40, 5);
            ctx.fillStyle = this.hp > 30 ? "#2ecc71" : "#e74c3c"; ctx.fillRect(-20, -85, (Math.max(0, this.hp) / 100) * 40, 5);
            ctx.restore();
        }
        drawX(x, y, size) { ctx.beginPath(); ctx.moveTo(x - size/2, y - size/2); ctx.lineTo(x + size/2, y + size/2); ctx.moveTo(x + size/2, y - size/2); ctx.lineTo(x - size/2, y + size/2); ctx.stroke(); }
    }

    let p1 = new AnimatedCharacter(500, '#ff4757', true), p2 = new AnimatedCharacter(WORLD_WIDTH - 500, '#1e90ff', false);

    function updateUI() {
        const txt = document.getElementById('turnText');
        txt.innerText = `P${game.turn} ATIŞI (${game.turn === 1 ? 'KIRMIZI' : 'MAVİ'})`;
        txt.style.color = game.turn === 1 ? p1.color : p2.color;
        document.getElementById('p1Score').innerText = game.score1;
        document.getElementById('p2Score').innerText = game.score2;
    }

    function checkTurnSwitch() {
        if (game.isFlying || game.isWaitingForAnim) return;
        if (p1.hp <= 0 || p2.hp <= 0) {
            if (p1.hp <= 0) game.score2++; else game.score1++;
            if (game.score1 >= 3 || game.score2 >= 3) endGame(game.score1 >= 3 ? 'KIRMIZI' : 'MAVİ');
            else setTimeout(resetRound, 1500);
        } else { game.turn = (game.turn === 1) ? 2 : 1; updateUI(); }
    }

    function resetRound() { p1.hp = 100; p2.hp = 100; p1.x = 500; p2.x = WORLD_WIDTH - 500; p1.state = "idle"; p2.state = "idle"; game.activeProjectiles = []; game.isFlying = false; game.isWaitingForAnim = false; generateTerrain(); updateUI(); }
    function endGame(winner) { game.state = 'GAME_OVER'; game.winner = winner; setTimeout(goToMainMenu, 4000); }

    const handleStart = (e) => {
        if (game.state !== 'PLAYING' || game.isWaitingForAnim) return;
        if (game.isFlying) {
            game.activeProjectiles.forEach(m => {
                if (!m.usedAbility) {
                    if (m.type === 'triple') {
                        game.activeProjectiles.push({...m, vy: m.vy-4, usedAbility: true, type: 'standard'});
                        game.activeProjectiles.push({...m, vy: m.vy+4, usedAbility: true, type: 'standard'});
                        m.usedAbility = true;
                    } else if (m.type === 'bomb') m.isExploded = true;
                    else if (m.type === 'lightning') { m.vx = 0; m.vy = 25; m.usedAbility = true; }
                }
            }); return;
        }
        game.isDragging = true;
        game.dragStart = { x: e.clientX || e.touches[0].clientX, y: e.clientY || e.touches[0].clientY };
        game.dragCurrent = game.dragStart;
    };
    const handleMove = (e) => { if (game.isDragging) game.dragCurrent = { x: e.clientX || e.touches[0].clientX, y: e.clientY || e.touches[0].clientY }; };
    const handleEnd = () => {
        if (!game.isDragging) return;
        game.isDragging = false;
        let vx = (game.dragStart.x - game.dragCurrent.x) * (game.dragSensitivity / GAME_SCALE);
        let vy = (game.dragStart.y - game.dragCurrent.y) * (game.dragSensitivity / GAME_SCALE);
        let mag = Math.hypot(vx, vy);
        if (mag > game.maxPower) { vx *= game.maxPower/mag; vy *= game.maxPower/mag; }
        if (mag > 3) {
            game.activeProjectiles = [{ x: (game.turn===1?p1.x:p2.x), y: getTerrainY(game.turn===1?p1.x:p2.x)-60, vx, vy, type: (game.turn===1?game.p1Weapon:game.p2Weapon), usedAbility: false, bounces: 0 }];
            game.isFlying = true;
        }
    };
    window.addEventListener('mousedown', handleStart); window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchstart', (e) => { if(game.state==='PLAYING') handleStart(e); e.preventDefault(); }, {passive: false});
    window.addEventListener('touchmove', (e) => { if(game.state==='PLAYING') handleMove(e); e.preventDefault(); }, {passive: false});
    window.addEventListener('touchend', handleEnd);

    function drawSpearGraphic(x, y, angle, type, bound=true, held=false) {
        ctx.save(); ctx.translate(bound ? x - game.cameraX : x, y); ctx.rotate(angle);
        ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = held ? 2 : 4;
        ctx.beginPath(); ctx.moveTo(held ? -15 : -25, 0); ctx.lineTo(15, 0); ctx.stroke();
        let color = '#f39c12'; if(type==='bomb') color='#e74c3c'; if(type==='triple') color='#9b59b6'; if(type==='bouncy') color='#f1c40f'; if(type==='lightning') color='#00d2ff'; if(type==='blackhole') color='#000000'; if(type==='freeze') color='#a1c4fd';
        ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(15, -6); ctx.lineTo(32, 0); ctx.lineTo(15, 6); ctx.fill();
        ctx.restore();
    }

    function update() {
        if (game.state === 'PLAYING' || game.state === 'GAME_OVER') {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            // KAMERA ÖLÇEĞİNİ UYGULA
            ctx.save();
            ctx.scale(GAME_SCALE, GAME_SCALE);
            
            // Ölçekleme sonrası ekranın ortalanması için ek ofset
            const offsetX = (canvas.width / GAME_SCALE - canvas.width) / 2;
            const offsetY = (canvas.height / GAME_SCALE - canvas.height) / 2;
            ctx.translate(0, offsetY); // Haritayı biraz aşağı kaydırarak gökyüzünü aç

            drawBackground();
            
            let focusX = game.isFlying && game.activeProjectiles[0] ? game.activeProjectiles[0].x : (game.isWaitingForAnim ? (game.turn===1?p2.x:p1.x) : (game.turn===1?p1.x:p2.x));
            
            // Kamera takibini ölçeklenmiş ekrana göre güncelle
            let targetCamX = focusX - (canvas.width / GAME_SCALE) / 2;
            game.cameraX += (targetCamX - game.cameraX) * 0.08;
            game.cameraX = Math.max(0, Math.min(game.cameraX, WORLD_WIDTH - (canvas.width / GAME_SCALE)));
            
            ctx.fillStyle = MAP_SETTINGS[game.currentMap].ground; ctx.beginPath(); ctx.moveTo(-game.cameraX, canvas.height / GAME_SCALE + 500);
            game.terrainPoints.forEach(p => ctx.lineTo(p.x - game.cameraX, p.y)); ctx.lineTo(WORLD_WIDTH-game.cameraX, canvas.height / GAME_SCALE + 500); ctx.fill();
            game.stuckInGround.forEach(s => drawSpearGraphic(s.x, s.y, s.angle, s.type));
            
            p1.update(); p2.update(); p1.draw(); p2.draw();

            if (game.isDragging && !game.isWaitingForAnim && game.state === 'PLAYING') {
                let p = game.turn === 1 ? p1 : p2;
                let sx = p.x - game.cameraX, sy = getTerrainY(p.x) - 60;
                let vx = (game.dragStart.x - game.dragCurrent.x) * (game.dragSensitivity / GAME_SCALE);
                let vy = (game.dragStart.y - game.dragCurrent.y) * (game.dragSensitivity / GAME_SCALE);
                let mag = Math.hypot(vx, vy); if(mag > game.maxPower) { vx *= game.maxPower/mag; vy *= game.maxPower/mag; mag = game.maxPower; }
                ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
                ctx.fillText(Math.round((mag/game.maxPower)*100) + "%", sx, sy - 110);
                let worldX = p.x, worldY = getTerrainY(p.x) - 60, tvx = vx, tvy = vy;
                for(let i=0; i<35; i++) {
                    ctx.beginPath(); ctx.fillStyle = `rgba(255, 255, 255, ${1 - (i/35)})`;
                    ctx.arc(worldX - game.cameraX, worldY, 3, 0, Math.PI*2); ctx.fill();
                    worldX += tvx; worldY += tvy; tvy += game.gravity;
                    if (worldY > getTerrainY(worldX)) break; 
                }
            }

            for (let i = game.activeProjectiles.length-1; i>=0; i--) {
                let m = game.activeProjectiles[i]; m.vy += game.gravity; m.x += m.vx; m.y += m.vy;
                drawSpearGraphic(m.x, m.y, Math.atan2(m.vy, m.vx), m.type);
                let target = game.turn === 1 ? p2 : p1;
                let ty = getTerrainY(m.x);
                let distBody = Math.hypot(m.x - target.x, m.y - (getTerrainY(target.x)-30));
                let distHead = Math.hypot(m.x - target.x, m.y - (getTerrainY(target.x)-55));
                if (m.isExploded || distHead < 35 || distBody < 55 || m.y > ty) {
                    if (m.type === 'blackhole') { createParticles(m.x, m.y, '#000', 60, 8); if(distBody < 150) target.takeHit(60); }
                    else if (m.isExploded || m.type === 'bomb') { createParticles(m.x, m.y, '#ff4500', 45, 6); if(distBody < 120) target.takeHit(50); }
                    else if (m.type === 'lightning') { createParticles(m.x, m.y, '#00d2ff', 30, 4); if(distBody < 60) target.takeHit(45); }
                    else if (m.type === 'freeze') { createParticles(m.x, m.y, '#a1c4fd', 30, 5); if(distBody < 40) target.takeHit(35); }
                    else if (distHead < 35) target.takeHit(75, true); 
                    else if (distBody < 55) target.takeHit(35); 
                    else if (m.type === 'bouncy' && m.bounces < 2) { m.vy *= -0.7; m.y = ty - 5; m.bounces++; continue; }
                    else { createParticles(m.x, ty, '#5d4037', 20, 4); game.stuckInGround.push({x:m.x, y:m.y, angle:Math.atan2(m.vy, m.vx), type:m.type}); }
                    game.activeProjectiles.splice(i, 1);
                    if(game.activeProjectiles.length === 0) { game.isFlying = false; if(!game.isWaitingForAnim) checkTurnSwitch(); }
                }
            }
            game.floatingTexts.forEach((t, i) => { t.y += t.vy; t.life -= 0.02; if(t.life<=0) game.floatingTexts.splice(i,1); ctx.globalAlpha = t.life; ctx.fillStyle = t.color; ctx.font = `bold ${t.size}px Arial`; ctx.textAlign="center"; ctx.fillText(t.text, t.x-game.cameraX, t.y); });
            game.particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= 0.02; if (p.life <= 0) game.particles.splice(i, 1); ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fillRect(p.x - game.cameraX, p.y, p.size, p.size); });
            ctx.restore(); // ÖLÇEĞİ SIFIRLA (UI İÇİN)
            
            ctx.globalAlpha = 1;
            if (game.state === 'GAME_OVER') { ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle=game.winner==='KIRMIZI'?'#ff4757':'#1e90ff'; ctx.font="50px Arial"; ctx.textAlign="center"; ctx.fillText(game.winner + " KAZANDI!", canvas.width/2, canvas.height/2); }
        }
        requestAnimationFrame(update);
    }
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight; update();
</script>
